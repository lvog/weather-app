<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather app</title>
  </head>
  <body>
    <div class="wrapper">
      <main class="main">
        <section class="weather-section">
          <div class="container">
            <div class="grid-row"></div>
            <form class="weather-form" action="#">
              <div class="form-group">
                <input
                  class="search"
                  type="search"
                  name="search"
                  placeholder="Search for your city ..."
                />
                <input class="btn" type="submit" value="Search" />
              </div>
              <span class="error-message"></span>
            </form>
            <div class="weather-block"></div>
          </div>
        </section>
      </main>
      <template id="weather-template">
        <div class="main-block flex-row">
          <div class="col-40">
            <div class="info-block flex-column justify-center">
              <h1 class="city"></h1>
              <ul class="info-list">
                <li>
                  <div class="date-holder">
                    <span class="day"></span>,
                    <span class="date"></span>
                    <span class="month"></span>
                  </div>
                </li>
                <li>
                  <div class="time-holder">
                    <span class="hours"></span>:<span class="minutes"></span>
                  </div>
                </li>
              </ul>
            </div>
          </div>
          <div class="col-60">
            <div class="info-block">
              <div class="flex-row align-center">
                <div class="col-33">
                  <ul class="info-list temp-list">
                    <li><span class="temp"></span>°C</li>
                    <li>Feels like: <span class="temp-feel-like"></span>°C</li>
                  </ul>
                </div>
                <div class="col-33">
                  <div class="main-info">
                    <div class="weather-icon"></div>
                    <strong class="h2 description"></strong>
                  </div>
                </div>
                <div class="col-33">
                  <ul class="info-list">
                    <li>
                      <i class="icon-wind"></i><span class="wind"></span> km/h
                      <span class="subtitle">Wind Speed</span>
                    </li>
                    <li>
                      <i class="icon-humidity"></i
                      ><span class="humidity"></span>
                      %
                      <span class="subtitle">Humidity</span>
                    </li>
                    <li>
                      <i class="icon-pressure"></i
                      ><span class="pressure"></span>
                      hPa
                      <span class="subtitle">Pressure</span>
                    </li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
